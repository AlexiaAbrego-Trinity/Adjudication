<template>
    <!-- Modal Container -->
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading" aria-modal="true" 
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <!-- Modal Header -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                            title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading" class="slds-modal__title slds-hyphenate">
                        {modalTitle}
                    </h2>
                    <template if:true={caseSummary}>
                        <p class="slds-m-top_x-small slds-text-body_small slds-text-color_weak">
                            Case: {caseSummary.caseNumber}
                        </p>
                    </template>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- Loading State -->
                    <template if:true={isLoading}>
                        <div class="slds-align_absolute-center slds-p-vertical_large">
                            <lightning-spinner alternative-text="Loading duplicate matches..." size="medium"></lightning-spinner>
                            <div class="slds-m-top_small slds-text-color_weak">Loading all duplicate matches...</div>
                        </div>
                    </template>

                    <!-- Error State -->
                    <template if:true={error}>
                        <div class="slds-notify slds-notify_alert slds-alert_error">
                            <span class="slds-assistive-text">Error</span>
                            <h2 class="slds-text-heading_small">
                                Unable to load duplicate matches
                            </h2>
                            <p class="slds-m-top_x-small">
                                {errorMessage}
                            </p>
                        </div>
                    </template>

                    <!-- Main Content -->
                    <template if:false={isLoading}>
                        <!-- Breadcrumb Navigation (UPDATED for 4-level navigation) -->
                        <template if:true={showBreadcrumb}>
                            <nav class="slds-breadcrumb slds-m-bottom_medium" role="navigation" aria-label="Breadcrumb">
                                <ol class="slds-breadcrumb__list">
                                    <!-- Level 1: MY Line Items -->
                                    <li class="slds-breadcrumb__item">
                                        <template if:true={isMyLineItemsView}>
                                            <span class="slds-breadcrumb__item-text">My Line Items</span>
                                        </template>
                                        <template if:false={isMyLineItemsView}>
                                            <a href="javascript:void(0);" onclick={handleBackToMyLineItems}>My Line Items</a>
                                        </template>
                                    </li>

                                    <!-- Level 2: Matching Cases -->
                                    <template if:true={selectedMyLineItemId}>
                                        <li class="slds-breadcrumb__item">
                                            <template if:true={isMatchingCasesView}>
                                                <span class="slds-breadcrumb__item-text">Matching Cases</span>
                                            </template>
                                            <template if:false={isMatchingCasesView}>
                                                <a href="javascript:void(0);" onclick={handleBackToMatchingCases}>Matching Cases</a>
                                            </template>
                                        </li>
                                    </template>

                                    <!-- Level 3: Bills -->
                                    <template if:true={selectedCaseId}>
                                        <li class="slds-breadcrumb__item">
                                            <template if:true={isBillView}>
                                                <span class="slds-breadcrumb__item-text">Bills</span>
                                            </template>
                                            <template if:false={isBillView}>
                                                <a href="javascript:void(0);" onclick={handleBackToBills}>Bills</a>
                                            </template>
                                        </li>
                                    </template>

                                    <!-- Level 4: Their Line Items -->
                                    <template if:true={selectedBillId}>
                                        <li class="slds-breadcrumb__item">
                                            <span class="slds-breadcrumb__item-text">Their Line Items</span>
                                        </li>
                                    </template>
                                </ol>
                            </nav>
                        </template>

                        <!-- Empty State (ADDED) -->
                        <template if:true={isEmpty}>
                            <div class="slds-align_absolute-center slds-p-vertical_large">
                                <lightning-icon icon-name="utility:search" size="large" variant="neutral"></lightning-icon>
                                <h3 class="slds-text-heading_medium slds-m-top_medium">No duplicate matches found</h3>
                                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                                    This Case has no duplicate line items.
                                </p>
                            </div>
                        </template>

                        <!-- LEVEL 1: MY LINE ITEMS VIEW (4-level navigation) -->
                        <template if:true={isMyLineItemsView}>
                            <div class="my-line-items-view">
                                <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                                    {myLineItemSummaries.length} of your line items have duplicates in other Cases
                                </div>
                                <template for:each={myLineItemSummaries} for:item="myLineItem">
                                    <div key={myLineItem.myLineItemId} class="slds-card slds-m-bottom_small">
                                        <div class="slds-card__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread">
                                                <div class="slds-col slds-size_3-of-4">
                                                    <h4 class="slds-text-heading_small slds-m-bottom_x-small">
                                                        💊 {myLineItem.myLineItemName}
                                                    </h4>
                                                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                                                            <span class="detail-label">Bill:</span>
                                                            <span class="detail-value">{myLineItem.myBillId}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                                                            <span class="detail-label">Charge:</span>
                                                            <span class="detail-value">{myLineItem.formattedChargeAmount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                                                            <span class="detail-label">Found in Cases:</span>
                                                            <span class="detail-value">{myLineItem.totalMatchingCases}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                                                            <span class="detail-label">Exact:</span>
                                                            <span class="detail-value">{myLineItem.exactCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-5">
                                                            <span class="detail-label">Potential:</span>
                                                            <span class="detail-value">{myLineItem.potentialCount}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                                    <lightning-button
                                                        label="View Matching Cases"
                                                        variant="brand"
                                                        size="small"
                                                        data-id={myLineItem.myLineItemId}
                                                        onclick={handleViewMatchingCases}>
                                                    </lightning-button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- LEVEL 2: MATCHING CASES VIEW (4-level navigation) -->
                        <template if:true={isMatchingCasesView}>
                            <div class="matching-cases-view">
                                <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                                    Found in {caseSummaries.length} Case(s)
                                </div>
                                <template for:each={caseSummaries} for:item="caseSummary">
                                    <div key={caseSummary.caseId} class="slds-card slds-m-bottom_small">
                                        <div class="slds-card__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread">
                                                <div class="slds-col slds-size_3-of-4">
                                                    <h4 class="slds-text-heading_small slds-m-bottom_x-small">
                                                        📋 Case: {caseSummary.caseNumber}
                                                    </h4>
                                                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Bills:</span>
                                                            <span class="detail-value">{caseSummary.billCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Matches:</span>
                                                            <span class="detail-value">{caseSummary.matchCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Exact:</span>
                                                            <span class="detail-value">{caseSummary.exactCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Potential:</span>
                                                            <span class="detail-value">{caseSummary.potentialCount}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                                    <lightning-button
                                                        label="View Bills"
                                                        variant="brand"
                                                        size="small"
                                                        data-id={caseSummary.caseId}
                                                        onclick={handleViewBillsForCase}>
                                                    </lightning-button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- LEVEL 3: BILLS VIEW (LEGACY - kept for backward compatibility) -->
                        <template if:true={isCaseView}>
                            <div class="cases-view">
                                <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                                    {caseSummaries.length} Case(s) with duplicate matches
                                </div>
                                <template for:each={caseSummaries} for:item="caseSummary">
                                    <div key={caseSummary.caseId} class="slds-card slds-m-bottom_small">
                                        <div class="slds-card__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread">
                                                <div class="slds-col slds-size_3-of-4">
                                                    <h4 class="slds-text-heading_small slds-m-bottom_x-small">
                                                        📋 Case: {caseSummary.caseNumber}
                                                    </h4>
                                                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Bills:</span>
                                                            <span class="detail-value">{caseSummary.billCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Line Items:</span>
                                                            <span class="detail-value">{caseSummary.totalLineItems}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Exact:</span>
                                                            <span class="detail-value">{caseSummary.exactCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                            <span class="detail-label">Potential:</span>
                                                            <span class="detail-value">{caseSummary.potentialCount}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                                    <lightning-button
                                                        label="View Bills"
                                                        variant="brand"
                                                        size="small"
                                                        data-case-id={caseSummary.caseId}
                                                        onclick={handleViewBills}>
                                                    </lightning-button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- LEVEL 3: BILLS VIEW (UPDATED for 4-level navigation) -->
                        <template if:true={isBillView}>
                            <div class="bills-view">
                                <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                                    {currentBillSummaries.length} Bill(s) with duplicate matches
                                </div>
                                <template for:each={currentBillSummaries} for:item="billSummary">
                                    <div key={billSummary.billExternalId} class="slds-card slds-m-bottom_small">
                                        <div class="slds-card__body slds-p-around_small">
                                            <div class="slds-grid slds-grid_align-spread">
                                                <div class="slds-col slds-size_3-of-4">
                                                    <h4 class="slds-text-heading_small slds-m-bottom_x-small">
                                                        📄 Bill: {billSummary.billExternalId}
                                                    </h4>
                                                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                        <div class="slds-col slds-size_1-of-3">
                                                            <span class="detail-label">Line Items:</span>
                                                            <span class="detail-value">{billSummary.lineItemCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-3">
                                                            <span class="detail-label">Exact:</span>
                                                            <span class="detail-value">{billSummary.exactCount}</span>
                                                        </div>
                                                        <div class="slds-col slds-size_1-of-3">
                                                            <span class="detail-label">Potential:</span>
                                                            <span class="detail-value">{billSummary.potentialCount}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                                    <lightning-button
                                                        label="View Line Items"
                                                        variant="brand"
                                                        size="small"
                                                        data-id={billSummary.billExternalId}
                                                        onclick={handleViewTheirLineItems}>
                                                    </lightning-button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- LEVEL 4: THEIR LINE ITEMS VIEW (4-level navigation) -->
                        <template if:true={isTheirLineItemsView}>
                            <div class="line-items-view">
                                <!-- Pagination Header -->
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                    <div class="slds-col">
                                        <div class="slds-text-body_small slds-text-color_weak">
                                            {paginationInfo}
                                        </div>
                                    </div>
                                    <div class="slds-col slds-text-align_right">
                                        <lightning-button-group>
                                            <lightning-button
                                                label="Previous"
                                                icon-name="utility:chevronleft"
                                                onclick={handlePreviousPage}
                                                disabled={isFirstPage}
                                                size="small">
                                            </lightning-button>
                                            <lightning-button
                                                label="Next"
                                                icon-name="utility:chevronright"
                                                icon-position="right"
                                                onclick={handleNextPage}
                                                disabled={isLastPage}
                                                size="small">
                                            </lightning-button>
                                        </lightning-button-group>
                                    </div>
                                </div>

                                <!-- Line Items List -->
                                <template if:true={hasMatches}>
                                    <template for:each={currentPageItems} for:item="match">
                                        <div key={match.recordId} class="match-card slds-card slds-m-bottom_small">
                                            <div class="slds-card__body slds-p-around_small">
                                                <div class="slds-grid slds-grid_align-spread">
                                                    <!-- Match Details -->
                                                    <div class="slds-col slds-size_3-of-4">
                                                        <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                            <!-- Record Name & Match Type -->
                                                            <div class="slds-col slds-size_1-of-1">
                                                                <h4 class="slds-text-heading_small">
                                                                    <lightning-button
                                                                        label={match.recordName}
                                                                        variant="base"
                                                                        data-record-id={match.recordId}
                                                                        onclick={handleNavigateToLineItem}
                                                                        class="record-link">
                                                                    </lightning-button>
                                                                    <lightning-badge
                                                                        label={match.matchTypeLabel}
                                                                        class="slds-m-left_x-small match-type-badge">
                                                                    </lightning-badge>
                                                                </h4>
                                                            </div>

                                                            <!-- Details Grid -->
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Confidence:</span>
                                                                    <span class="detail-value">{match.confidenceLabel}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Charge:</span>
                                                                    <span class="detail-value">{match.formattedChargeAmount}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Service Date:</span>
                                                                    <span class="detail-value">{match.formattedServiceDates}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Procedure:</span>
                                                                    <span class="detail-value">{match.procedureCode}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Bill ID:</span>
                                                                    <span class="detail-value">{match.billExternalId}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Patient:</span>
                                                                    <span class="detail-value">{match.patientId}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <!-- Actions -->
                                                    <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                                        <lightning-button
                                                            label="View Case"
                                                            variant="neutral"
                                                            size="small"
                                                            data-case-id={match.caseId}
                                                            onclick={handleNavigateToCase}
                                                            class="slds-m-bottom_x-small">
                                                        </lightning-button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </template>

                                <!-- No Items State -->
                                <template if:false={hasMatches}>
                                    <div class="slds-align_absolute-center slds-p-vertical_large">
                                        <lightning-icon icon-name="utility:search" size="large" variant="neutral"></lightning-icon>
                                        <h3 class="slds-text-heading_medium slds-m-top_medium">No line items found</h3>
                                    </div>
                                </template>

                                <!-- Pagination Footer -->
                                <template if:true={hasMatches}>
                                    <div class="slds-grid slds-grid_align-center slds-m-top_small">
                                        <div class="slds-col">
                                            <div class="slds-text-align_center slds-text-body_small slds-text-color_weak">
                                                Page {currentPage} of {totalPages}
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- LEGACY: LINE ITEMS VIEW (3-level navigation - backward compatibility) -->
                        <template if:true={isLineItemView}>
                            <div class="line-items-view">
                                <!-- Pagination Header -->
                                <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                    <div class="slds-col">
                                        <div class="slds-text-body_small slds-text-color_weak">
                                            {paginationInfo}
                                        </div>
                                    </div>
                                    <div class="slds-col slds-text-align_right">
                                        <lightning-button-group>
                                            <lightning-button
                                                label="Previous"
                                                icon-name="utility:chevronleft"
                                                onclick={handlePreviousPage}
                                                disabled={isFirstPage}
                                                size="small">
                                            </lightning-button>
                                            <lightning-button
                                                label="Next"
                                                icon-name="utility:chevronright"
                                                icon-position="right"
                                                onclick={handleNextPage}
                                                disabled={isLastPage}
                                                size="small">
                                            </lightning-button>
                                        </lightning-button-group>
                                    </div>
                                </div>

                                <!-- Line Items List -->
                                <template if:true={hasMatches}>
                                    <template for:each={currentPageItems} for:item="match">
                                        <div key={match.recordId} class="match-card slds-card slds-m-bottom_small">
                                            <div class="slds-card__body slds-p-around_small">
                                                <div class="slds-grid slds-grid_align-spread">
                                                    <!-- Match Details -->
                                                    <div class="slds-col slds-size_3-of-4">
                                                        <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                            <!-- Record Name & Match Type -->
                                                            <div class="slds-col slds-size_1-of-1">
                                                                <h4 class="slds-text-heading_small">
                                                                    <lightning-button
                                                                        label={match.recordName}
                                                                        variant="base"
                                                                        data-record-id={match.recordId}
                                                                        onclick={handleNavigateToLineItem}
                                                                        class="record-link">
                                                                    </lightning-button>
                                                                    <lightning-badge
                                                                        label={match.matchTypeLabel}
                                                                        class="slds-m-left_x-small match-type-badge">
                                                                    </lightning-badge>
                                                                </h4>
                                                            </div>

                                                            <!-- Details Grid -->
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Confidence:</span>
                                                                    <span class="detail-value">{match.confidenceLabel}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Charge:</span>
                                                                    <span class="detail-value">{match.formattedChargeAmount}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Service Date:</span>
                                                                    <span class="detail-value">{match.formattedServiceDates}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Procedure:</span>
                                                                    <span class="detail-value">{match.procedureCode}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Bill ID:</span>
                                                                    <span class="detail-value">{match.billExternalId}</span>
                                                                </div>
                                                            </div>
                                                            <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                                                <div class="detail-item">
                                                                    <span class="detail-label">Patient:</span>
                                                                    <span class="detail-value">{match.patientId}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <!-- Actions -->
                                                    <div class="slds-col slds-size_1-of-4 slds-text-align_right">
                                                        <lightning-button
                                                            label="View Case"
                                                            variant="neutral"
                                                            size="small"
                                                            data-case-id={match.caseId}
                                                            onclick={handleNavigateToCase}
                                                            class="slds-m-bottom_x-small">
                                                        </lightning-button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                </template>

                                <!-- No Items State -->
                                <template if:false={hasMatches}>
                                    <div class="slds-align_absolute-center slds-p-vertical_large">
                                        <lightning-icon icon-name="utility:search" size="large" variant="neutral"></lightning-icon>
                                        <h3 class="slds-text-heading_medium slds-m-top_medium">No line items found</h3>
                                    </div>
                                </template>

                                <!-- Pagination Footer -->
                                <template if:true={hasMatches}>
                                    <div class="slds-grid slds-grid_align-center slds-m-top_small">
                                        <div class="slds-col">
                                            <div class="slds-text-align_center slds-text-body_small slds-text-color_weak">
                                                Page {currentPage} of {totalPages}
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </template>
                </div>

                <!-- Modal Footer -->
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Close"
                        variant="neutral"
                        onclick={handleClose}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
