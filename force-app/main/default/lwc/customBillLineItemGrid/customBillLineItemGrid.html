<template>
    <!-- TRINITY: Clean, professional header -->
    <!-- TRINITY PHASE 3: Disable default context menu on entire grid -->
    <div class="custom-grid-container" data-stage={selectedStage} oncontextmenu={preventDefaultContextMenu}>
        <div class="custom-grid-header">
            <div class="header-left">
                <h2 class="slds-text-heading_medium">Bill Line Items</h2>
                <template if:true={hasSelectedItems}>
                    <span class="selected-count">({selectedCount} selected)</span>
                </template>
                <span class="slds-text-body_small slds-text-color_weak" style="margin-left: 8px;">v2.6.5-date-fix</span>
            </div>
            <div class="header-right">
                <!-- MVADM-170: BCN Custom Status Badge (Read-Only Display) -->
                <template if:true={billCustomStatus}>
                    <div class="bcn-status-badge">
                        <span class="slds-badge slds-badge_lightest">
                            <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                            Bill Status: {billCustomStatus}
                        </span>
                    </div>
                </template>

                <!-- Stage selector -->
                <div class="stage-selector">
                    <lightning-combobox
                        name="stage"
                        label="Stage"
                        value={currentStage}
                        placeholder="Select Stage"
                        options={stageOptions}
                        onchange={handleStageChange}
                        variant="label-hidden"
                        disabled={stageSelectorDisabled}>
                    </lightning-combobox>
                </div>

                <!-- Action buttons (hidden when adjudicated) -->
                <template if:true={hasSelectedItems}>
                    <template if:true={isEditable}>
                        <lightning-button
                            label="Duplicate"
                            onclick={handleDuplicate}
                            variant="neutral">
                        </lightning-button>
                        <lightning-button
                            label="Delete"
                            onclick={handleDelete}
                            variant="destructive">
                        </lightning-button>
                    </template>
                </template>

                <!-- TRINITY v2.3.2: Adjudicate button (Bill Review stage only) -->
                <!-- RAY FEEDBACK #9: Disabled during processing to prevent double-clicks -->
                <template if:true={showAdjudicateButton}>
                    <lightning-button
                        label="Adjudicate"
                        onclick={handleAdjudicate}
                        variant="brand"
                        icon-name="utility:check"
                        disabled={isAdjudicating}
                        title="Run validation and adjudicate this case">
                    </lightning-button>
                </template>

                <!-- TRINITY PHASE 1.6: View Report button (CHRIS'S #1 PRIORITY) -->
                <!-- Shows after validation has been run, allows reopening validation modal -->
                <template if:true={showViewReportButton}>
                    <lightning-button
                        label="View Report"
                        onclick={handleViewReport}
                        variant="neutral"
                        icon-name="utility:preview"
                        title="View validation report">
                    </lightning-button>
                </template>
            </div>
        </div>

        <!-- STAGE RETENTION: Locked state banner -->
        <template if:true={isAdjudicated}>
            <div class="slds-notify slds-notify_alert slds-theme_warning " role="alert">
                <span class="slds-icon_container slds-icon-utility-lock slds-m-right_x-small" title="Locked">
                    <lightning-icon icon-name="utility:lock" size="x-small" alternative-text="Locked"></lightning-icon>
                </span>
                <h2 class="slds-text-heading_small">
                    <strong>This case has been adjudicated and is locked for editing.</strong>
                    All fields are read-only to prevent accidental changes.
                </h2>
            </div>
        </template>

        <!-- Loading spinner -->
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>
        
        <!-- Error message -->
        <template if:true={error}>
            <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                <span class="slds-assistive-text">Error</span>
                <h2>{error}</h2>
            </div>
        </template>

        <!-- TRINITY v2.5.1: BCN Validation Error (CRITICAL BLOCKER FIX) -->
        <template if:true={showValidationError}>
            <div class="slds-text-align_center slds-p-around_large">
                <lightning-icon icon-name="utility:error" size="large" variant="error"></lightning-icon>
                <h3 class="slds-text-heading_medium slds-m-top_medium slds-text-color_error">Cannot Load Bill Line Items</h3>
                <p class="slds-text-body_regular slds-text-color_weak slds-m-top_small">
                    {bcnValidationError}
                </p>
                <p class="slds-text-body_small slds-text-color_weak slds-m-top_medium">
                    Please ensure the case has progressed to Keying stage and has a valid Bill (BCN) record before opening the Bill Line Items grid.
                </p>
            </div>
        </template>

        <!-- Main grid table -->
        <template if:false={isLoading}>
            <template if:false={error}>
                <template if:true={showGrid}>
                    <div class="grid-container">

                    <!-- RAY FEEDBACK #9: Overlay spinner during adjudication -->
                    <template if:true={isAdjudicating}>
                        <div class="adjudication-overlay">
                            <div class="adjudication-spinner-container">
                                <div class="spinner-wrapper">
                                    <lightning-spinner alternative-text={adjudicationMessage} size="medium"></lightning-spinner>
                                </div>
                                <div class="adjudication-message">{adjudicationMessage}</div>
                            </div>
                        </div>
                    </template>

                    <!-- TRINITY: Horizontal scroll wrapper for professional grid navigation -->
                    <div class="grid-scroll-wrapper">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-grid-table">
                        <!-- TRINITY v2.6.0: Excel-perfect column resizing with <colgroup> -->
                        <colgroup>
                            <!-- TRINITY: Keying/Bill Review view columns -->
                            <template if:false={showQuoteView}>
                                <!-- Fixed columns (no resize) - TRINITY: Explicit widths required for table-layout: fixed -->
                                <!-- CLAIMS OPTIMIZATION: Compact widths for better space utilization -->
                                <col class="selection-col" style="width: 30px;">
                                <col class="duplicate-col" style="width: 35px;">

                                <!-- Resizable columns -->
                                <col data-column="lineNumber" style={lineNumberColWidth}>
                                <col data-column="serviceDates" style={serviceDatesColWidth}>
                                <template if:true={serviceDatesExpanded}>
                                    <col data-column="endDate" style={endDateColWidth}>
                                </template>
                                <col data-column="codes" style={codesColWidth}>
                                <template if:true={codesExpanded}>
                                    <col data-column="pos" style={posColWidth}>
                                    <col data-column="cpt" style={cptColWidth}>
                                    <col data-column="modifier" style={modifierColWidth}>
                                </template>
                                <col data-column="quantity" style={quantityColWidth}>
                                <!--<col data-column="customStatus" style={customStatusColWidth}--> 
                                <col data-column="description" style={descriptionColWidth}>
                                <col data-column="charge" style={chargeColWidth}>

                                <!-- Adjudication columns (Bill Review stage only) -->
                                <template if:true={showAdjudicationColumns}>
                                    <!-- CLAIMS REQUEST #2: OI columns conditional on oiFieldsExpanded -->
                                    <col data-column="oiAllow" style={oiAllowColWidth}>
                                    <template if:true={oiFieldsExpanded}>
                                        <col data-column="oiPaid" style={oiPaidColWidth}>
                                    </template>
                                    <col data-column="paid" style={paidColWidth}>
                                    <col data-column="thirdParty" style={thirdPartyColWidth}>
                                    <col data-column="patResp" style={patRespColWidth}>
                                    <col data-column="remarkCodes" style={remarkCodesColWidth}>
                                    <template if:true={remarkCodesExpanded}>
                                        <col data-column="rc2" style={rc2ColWidth}>
                                        <col data-column="rc3" style={rc3ColWidth}>
                                        <col data-column="rc4" style={rc4ColWidth}>
                                    </template>
                                    <col data-column="account" style={accountColWidth}>
                                    <col data-column="medicare" style={medicareColWidth}>
                                </template>
                            </template>

                            <!-- TRINITY: Quote view columns -->
                            <template if:true={showQuoteView}>
                                <col class="selection-col">
                                <col data-column="lineNumber" style={lineNumberColWidth}>
                                <col data-column="description" style={descriptionColWidth}>
                                <col data-column="quantity" style={quantityColWidth}>
                                <col data-column="code" style={codeColWidth}>
                                <col data-column="price" style={priceColWidth}>
                                <col data-column="approvedAmount" style={approvedAmountColWidth}>
                            </template>
                        </colgroup>
                        <thead>
                            <tr class="slds-line-height_reset">
                                <!-- TRINITY v2.5.0: Keying/Bill Review headers (existing functionality) -->
                                <template if:false={showQuoteView}>
                                    <!-- Selection column - RAY FEEDBACK #12: Disable when adjudicated -->
                                    <th class="slds-text-align_center selection-column" scope="col">
                                        <lightning-input
                                            type="checkbox"
                                            checked={allSelected}
                                            onchange={handleSelectAll}
                                            variant="label-hidden"
                                            aria-label="Select All"
                                            disabled={isAdjudicated}>
                                        </lightning-input>
                                    </th>

                                    <!-- Duplicate Flag column -->
                                    <th class="slds-text-align_center" scope="col" title="Duplicate Status">
                                        <lightning-icon icon-name="utility:warning" size="x-small"></lightning-icon>
                                    </th>

                                    <!-- TRINITY PHASE 1: Line Number column (meeting req line 172) -->
                                    <th class="resizable-column slds-text-align_center" scope="col" style="width: 60px;">
                                        <span class="column-label" style={lineNumberSpanWidth}>Line #</span>
                                        <div class="column-resizer"
                                             data-column="lineNumber"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                <!-- Service Dates - Expandable -->
                                <th class="expandable-column-header resizable-column" scope="col">
                                    <div class="header-content">
                                        <span class="column-label" style={serviceDatesSpanWidth}>
                                            <template if:false={serviceDatesExpanded}>Service Date</template>
                                            <template if:true={serviceDatesExpanded}>Start Date</template>
                                        </span>
                                        <button class="toggle-button" onclick={toggleServiceDates} title="Toggle Service Dates">
                                            <span class="expand-icon">
                                                <template if:false={serviceDatesExpanded}>⟨⟩</template>
                                                <template if:true={serviceDatesExpanded}>⟩⟨</template>
                                            </span>
                                        </button>
                                    </div>
                                    <div class="column-resizer"
                                         data-column="serviceDates"
                                         onmousedown={handleResizeStart}>
                                    </div>
                                </th>

                                <!-- End Date (when expanded) -->
                                <template if:true={serviceDatesExpanded}>
                                    <th class="expandable-column-header resizable-column" scope="col">
                                        <span class="column-label" style={endDateSpanWidth}>End Date</span>
                                        <div class="column-resizer"
                                             data-column="endDate"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                </template>
                                
                                <!-- Codes - Expandable -->
                                <th class="expandable-column-header resizable-column" scope="col">
                                    <div class="header-content">
                                        <span class="column-label" style={codesSpanWidth}>
                                            <template if:false={codesExpanded}>Codes</template>
                                            <template if:true={codesExpanded}>Revenue Code</template>
                                        </span>
                                        <button class="toggle-button" onclick={toggleCodes} title="Toggle Codes">
                                            <span class="expand-icon">
                                                <template if:false={codesExpanded}>⟨⟩</template>
                                                <template if:true={codesExpanded}>⟩⟨</template>
                                            </span>
                                        </button>
                                    </div>
                                    <div class="column-resizer"
                                         data-column="codes"
                                         onmousedown={handleResizeStart}>
                                    </div>
                                </th>

                                <!-- Additional code columns when expanded -->
                                <template if:true={codesExpanded}>
                                    <th class="expandable-column-header resizable-column" scope="col">
                                        <span class="column-label" style={posSpanWidth}>POS</span>
                                        <div class="column-resizer"
                                             data-column="pos"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                    <th class="expandable-column-header resizable-column" scope="col">
                                        <!-- TRINITY PHASE 1: Updated per Ray's specification (meeting line 296) -->
                                        <span class="column-label" style={cptSpanWidth}>HCPCS/CPT/NDC</span>
                                        <div class="column-resizer"
                                             data-column="cpt"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                    <th class="expandable-column-header resizable-column" scope="col">
                                        <span class="column-label" style={modifierSpanWidth}>Modifier</span>
                                        <div class="column-resizer"
                                             data-column="modifier"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                </template>

                                <!-- Basic columns -->
                                <th class="resizable-column" scope="col">
                                    <span class="column-label" style={quantitySpanWidth}>Quantity</span>
                                    <div class="column-resizer"
                                         data-column="quantity"
                                         onmousedown={handleResizeStart}>
                                    </div>
                                </th>
                                <!--<th class="resizable-column" scope="col">
                                    Status
                                    <div class="column-resizer"
                                        data-column="customStatus"
                                        onmousedown={handleResizeStart}>
                                    </div>
                                </th-->
                                <th class="resizable-column" scope="col">
                                    <span class="column-label" style={descriptionSpanWidth}>Description</span>
                                    <div class="column-resizer"
                                         data-column="description"
                                         onmousedown={handleResizeStart}>
                                    </div>
                                </th>
                                <th class="resizable-column" scope="col">
                                    <span class="column-label" style={chargeSpanWidth}>Charge</span>
                                    <div class="column-resizer"
                                         data-column="charge"
                                         onmousedown={handleResizeStart}>
                                    </div>
                                </th>

                                <!-- Adjudication columns (Bill Review stage only) -->
                                <template if:true={showAdjudicationColumns}>
                                    <!-- CLAIMS REQUEST #2: OI Allow/Paid Expandable Columns -->
                                    <th class="expandable-column-header resizable-column" scope="col">
                                        <div class="header-content">
                                            <span class="column-label" style={oiAllowSpanWidth}>
                                                <template if:false={oiFieldsExpanded}>OI</template>
                                                <template if:true={oiFieldsExpanded}>OI Allow</template>
                                            </span>
                                            <button class="toggle-button" onclick={toggleOIFields} title="Toggle OI Allow/Paid">
                                                <span class="expand-icon">
                                                    <template if:false={oiFieldsExpanded}>⟨⟩</template>
                                                    <template if:true={oiFieldsExpanded}>⟩⟨</template>
                                                </span>
                                            </button>
                                        </div>
                                        <div class="column-resizer"
                                             data-column="oiAllow"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- OI Paid header - only show when expanded -->
                                    <template if:true={oiFieldsExpanded}>
                                        <th class="expandable-column-header resizable-column" scope="col">
                                            <span class="column-label" style={oiPaidSpanWidth}>OI Paid</span>
                                            <div class="column-resizer"
                                                 data-column="oiPaid"
                                                 onmousedown={handleResizeStart}>
                                            </div>
                                        </th>
                                    </template>
                                    <th class="resizable-column" scope="col">
                                        <span class="column-label" style={paidSpanWidth}>Paid</span>
                                        <div class="column-resizer"
                                             data-column="paid"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                    <th class="resizable-column" scope="col">
                                        <span class="column-label" style={thirdPartySpanWidth}>3rd Party</span>
                                        <div class="column-resizer"
                                             data-column="thirdParty"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                    <th class="resizable-column" scope="col">
                                        <span class="column-label" style={patRespSpanWidth}>Pat Resp</span>
                                        <div class="column-resizer"
                                             data-column="patResp"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Remark Codes - Expandable -->
                                    <th class="expandable-column-header resizable-column" scope="col">
                                        <div class="header-content">
                                            <span class="column-label" style={remarkCodesSpanWidth}>
                                                <template if:false={remarkCodesExpanded}>Remark Codes</template>
                                                <template if:true={remarkCodesExpanded}>RC1</template>
                                            </span>
                                            <button class="toggle-button" onclick={toggleRemarkCodes} title="Toggle Remark Codes">
                                                <span class="expand-icon">
                                                    <template if:false={remarkCodesExpanded}>⟨⟩</template>
                                                    <template if:true={remarkCodesExpanded}>⟩⟨</template>
                                                </span>
                                            </button>
                                        </div>
                                        <div class="column-resizer"
                                             data-column="remarkCodes"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Additional remark code columns when expanded -->
                                    <template if:true={remarkCodesExpanded}>
                                        <th class="expandable-column-header resizable-column" scope="col">
                                            <span class="column-label" style={rc2SpanWidth}>RC2</span>
                                            <div class="column-resizer"
                                                 data-column="rc2"
                                                 onmousedown={handleResizeStart}>
                                            </div>
                                        </th>
                                        <th class="expandable-column-header resizable-column" scope="col">
                                            <span class="column-label" style={rc3SpanWidth}>RC3</span>
                                            <div class="column-resizer"
                                                 data-column="rc3"
                                                 onmousedown={handleResizeStart}>
                                            </div>
                                        </th>
                                        <th class="expandable-column-header resizable-column" scope="col">
                                            <span class="column-label" style={rc4SpanWidth}>RC4</span>
                                            <div class="column-resizer"
                                                 data-column="rc4"
                                                 onmousedown={handleResizeStart}>
                                            </div>
                                        </th>
                                    </template>

                                    <th class="resizable-column" scope="col">
                                        <span class="column-label" style={accountSpanWidth}>Account</span>
                                        <div class="column-resizer"
                                             data-column="account"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                    <th class="resizable-column" scope="col">
                                        <span class="column-label" style={medicareSpanWidth}>Medicare</span>
                                        <div class="column-resizer"
                                             data-column="medicare"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                </template>
                                </template>

                                <!-- TRINITY v2.5.0: Quote View headers (simplified 6-column layout) -->
                                <template if:true={showQuoteView}>
                                    <!-- Selection column - RAY FEEDBACK #12: Disable when adjudicated -->
                                    <th class="slds-text-align_center selection-column" scope="col">
                                        <lightning-input
                                            type="checkbox"
                                            checked={allSelected}
                                            onchange={handleSelectAll}
                                            variant="label-hidden"
                                            aria-label="Select All"
                                            disabled={isAdjudicated}>
                                        </lightning-input>
                                    </th>

                                    <!-- Line Number -->
                                    <th class="resizable-column slds-text-align_center" scope="col" style="width: 80px;">
                                        Line #
                                        <div class="column-resizer"
                                             data-column="lineNumber"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Description -->
                                    <th class="resizable-column" scope="col" style="width: 200px;">
                                        Description
                                        <div class="column-resizer"
                                             data-column="description"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Quantity -->
                                    <th class="resizable-column slds-text-align_center" scope="col" style="width: 80px;">
                                        Qty
                                        <div class="column-resizer"
                                             data-column="quantity"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Code (HCPCS/CPT/NDC) -->
                                    <th class="resizable-column" scope="col" style="width: 150px;">
                                        Code
                                        <div class="column-resizer"
                                             data-column="code"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Price (Charge) -->
                                    <th class="resizable-column slds-text-align_right" scope="col" style="width: 120px;">
                                        Price
                                        <div class="column-resizer"
                                             data-column="price"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>

                                    <!-- Approved Amount -->
                                    <th class="resizable-column slds-text-align_right" scope="col" style="width: 120px;">
                                        Approved Amount
                                        <div class="column-resizer"
                                             data-column="approvedAmount"
                                             onmousedown={handleResizeStart}>
                                        </div>
                                    </th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={lineItems} for:item="item">
                                <tr key={item.Id} class={item.rowClass} onclick={handleLineItemClick} data-item-id={item.Id} style="cursor: pointer;">
                                    <!-- TRINITY v2.5.0: Keying/Bill Review rows (existing functionality) -->
                                    <template if:false={showQuoteView}>
                                        <!-- Selection checkbox - RAY FEEDBACK #12: Disable when adjudicated -->
                                        <td class="slds-text-align_center">
                                            <template if:false={item.isDraft}>
                                                <lightning-input
                                                    type="checkbox"
                                                    checked={item.selected}
                                                    onchange={handleRowSelect}
                                                    data-row-id={item.Id}
                                                    variant="label-hidden"
                                                    aria-label="Select Row"
                                                    disabled={isAdjudicated}>
                                                </lightning-input>
                                            </template>
                                        </td>

                                        <!-- MVADM-185: Duplicate Flag with enhanced tooltip and clickable modal -->
                                        <td class="slds-text-align_center duplicate-flag-cell">
                                            <template if:true={item.isDuplicate}>
                                                <div class="duplicate-icons-container"
                                                     data-item-id={item.id}
                                                     onclick={handleDuplicateIconClick}
                                                     style="cursor: pointer;">
                                                    <!-- Exact Duplicate: Green triangle with tooltip -->
                                                    <template if:true={item.isExactDuplicate}>
                                                        <c-hover-tooltip
                                                            content={item.duplicateStatusLabel}
                                                            position="right"
                                                            max-width="350"
                                                            delay="300">
                                                            <lightning-icon
                                                                icon-name="utility:warning"
                                                                size="small"
                                                                variant="success">
                                                            </lightning-icon>
                                                        </c-hover-tooltip>
                                                    </template>
                                                    <!-- Potential Duplicate: Yellow triangle with tooltip -->
                                                    <template if:false={item.isExactDuplicate}>
                                                        <c-hover-tooltip
                                                            content={item.duplicateStatusLabel}
                                                            position="right"
                                                            max-width="350"
                                                            delay="300">
                                                            <lightning-icon
                                                                icon-name="utility:warning"
                                                                size="small"
                                                                variant="warning">
                                                            </lightning-icon>
                                                        </c-hover-tooltip>
                                                    </template>
                                                    <!-- Green moneybag if exact charge match (for both Exact and Potential) -->
                                                    <template if:true={item.hasExactChargeMatch}>
                                                        <c-hover-tooltip
                                                            content="Exact charge match found in duplicate records"
                                                            position="right"
                                                            max-width="250"
                                                            delay="300">
                                                            <lightning-icon
                                                                icon-name="utility:moneybag"
                                                                size="small"
                                                                variant="success">
                                                            </lightning-icon>
                                                        </c-hover-tooltip>
                                                    </template>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- TRINITY PHASE 1: Line Number display (calculated from array index) -->
                                        <td class="slds-text-align_center line-number-cell">
                                            {item.lineNumber}
                                        </td>

                                    <!-- Service Dates -->
                                    <template if:false={serviceDatesExpanded}>
                                        <td class="expandable-column">
                                            <div class="stacked-display">
                                                <div class="stacked-field">
                                                    <span class="field-label">Start:</span>
                                                    <span class="field-value">{item.formattedStartDate}</span>
                                                </div>
                                                <div class="stacked-field">
                                                    <span class="field-label">End:</span>
                                                    <span class="field-value">{item.formattedEndDate}</span>
                                                </div>
                                            </div>
                                        </td>
                                    </template>
                                    <template if:true={serviceDatesExpanded}>
                                        <td>
                                            <div class="date-input-container">
                                                <!-- TRINITY v2.7.3: Use formatted date to prevent timezone shift -->
                                                <input
                                                    type="text"
                                                    class="date-input"
                                                    value={item.formattedStartDate}
                                                    onfocus={handleDateFocus}

            <div class="slds-dropdown slds-dropdown_left slds-dropdown_small">
                <ul class="slds-dropdown__list" role="menu">
                    <li class="slds-dropdown__header context-menu-header" role="separator"
                        onmousedown={handleDragStart}
                        data-draggable="true">
                        <span class="slds-text-title_caps">Bulk Assignment</span>
                        <button class="context-menu-close" onclick={closeContextMenu} title="Close">
                            <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
                        </button>
                    </li>
                    <li class="slds-dropdown__item" role="presentation">
                        <a href="javascript:void(0);" role="menuitem" tabindex="0" onclick={handleApplyToAll}>
                            <span class="slds-truncate" title="Apply to all rows">Apply to all rows</span>
                        </a>
                    </li>
                    <li class="slds-dropdown__item" role="presentation">
                        <a href="javascript:void(0);" role="menuitem" tabindex="-1" onclick={handleApplyToBlank}>
                            <span class="slds-truncate" title="Apply to blank rows only">Apply to blank rows only</span>
                        </a>
                    </li>
                    <li class="slds-dropdown__item" role="presentation">
                        <a href="javascript:void(0);" role="menuitem" tabindex="-1" onclick={handleApplyToFollowing}>
                            <span class="slds-truncate" title="Apply to following rows">Apply to following rows...</span>
                        </a>
                    </li>
                    <li class="slds-dropdown__item" role="separator"></li>
                    <li class="slds-dropdown__item" role="presentation">
                        <a href="javascript:void(0);" role="menuitem" tabindex="-1" onclick={closeContextMenu}>
                            <span class="slds-truncate" title="Cancel">Cancel</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </template>

    <!-- TRINITY PHASE 3: Payment Context Menu for Bulk Payment Operations -->
    <template if:true={isPaymentContextMenu}>
        <div class="context-menu payment-context-menu" style={contextMenuStyle} onclick={stopPropagation}>
            <div class="slds-popover slds-popover_medium" role="dialog">
                <div class="slds-popover__body">
                    <div class="slds-form slds-form_stacked">
                        <!-- Header with Drag Handle -->
                        <div class="slds-text-heading_small slds-m-bottom_small context-menu-header"
                             onmousedown={handleDragStart}
                             data-draggable="true"
                             style="cursor: move; position: relative; padding-right: 2rem;">
                            Bulk Payment Operation
                            <button class="context-menu-close" onclick={closeContextMenu} title="Close">
                                <lightning-icon icon-name="utility:close" size="x-small"></lightning-icon>
                            </button>
                        </div>

                        <!-- Operation Type Selection -->
                        <div class="slds-form-element slds-m-bottom_small">
                            <lightning-radio-group
                                name="operationType"
                                label="Operation Type"
                                options={paymentOperationOptions}
                                value={selectedPaymentOperation}
                                onchange={handlePaymentOperationChange}
                                variant="label-inline">
                            </lightning-radio-group>
                        </div>

                        <!-- Percentage Input -->
                        <template if:true={isPercentageOperation}>
                            <div class="slds-form-element slds-m-bottom_small">
                                <lightning-input
                                    type="number"
                                    label="Percentage of Charge"
                                    value={paymentPercentage}
                                    min="0"
                                    max="100"
                                    step="1"
                                    onchange={handlePaymentPercentageChange}
                                    placeholder="e.g., 80">
                                </lightning-input>
                                <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                    Example: 80% will calculate 80% of each row's Charge amount
                                </div>
                            </div>
                        </template>

                        <!-- Fixed Amount Input -->
                        <template if:true={isFixedAmountOperation}>
                            <div class="slds-form-element slds-m-bottom_small">
                                <lightning-input
                                    type="number"
                                    label="Fixed Dollar Amount"
                                    value={paymentFixedAmount}
                                    min="0"
                                    step="0.01"
                                    formatter="currency"
                                    onchange={handlePaymentFixedAmountChange}
                                    placeholder="e.g., 150.00">
                                </lightning-input>
                                <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                    This amount will be applied to all selected rows
                                </div>
                            </div>
                        </template>

                        <!-- Apply To Selection -->
                        <div class="slds-form-element slds-m-bottom_small">
                            <lightning-radio-group
                                name="applyTo"
                                label="Apply To"
                                options={paymentApplyToOptions}
                                value={paymentApplyTo}
                                onchange={handlePaymentApplyToChange}
                                variant="label-inline">
                            </lightning-radio-group>
                        </div>

                        <!-- Following Rows Input -->
                        <template if:true={showFollowingRowsInput}>
                            <div class="slds-form-element slds-m-bottom_small">
                                <lightning-input
                                    type="number"
                                    label="Number of Following Rows"
                                    value={followingRowsCount}
                                    min="1"
                                    onchange={handleFollowingRowsChange}>
                                </lightning-input>
                            </div>
                        </template>

                        <!-- Action Buttons -->
                        <div class="slds-grid slds-grid_align-end slds-m-top_small">
                            <lightning-button
                                label="Cancel"
                                onclick={closeContextMenu}
                                class="slds-m-right_x-small">
                            </lightning-button>
                            <lightning-button
                                variant="brand"
                                label="Apply"
                                onclick={applyPaymentBulkOperation}
                                disabled={isApplyDisabled}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- TRINITY v2.3.8-passed-rules-fix: Validation Report Modal -->
    <template if:true={showValidationModal}>
        <c-validation-report-modal
            validation-result={validationResult}
            is-processing={isProcessingAdjudication}
            onclose={handleCloseValidationModal}
            onfixissues={handleFixIssues}
            onproceed={handleProceedWithAdjudication}>
        </c-validation-report-modal>
    </template>

    <!-- TRINITY DUPLICATE WARNING: Modal to warn about duplicates before adjudication -->
    <template if:true={showDuplicateWarningModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="duplicate-modal-heading" aria-modal="true"
                 class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <!-- Modal Header - RED ALERT THEME -->
                <header class="slds-modal__header slds-theme_error slds-theme_alert-texture">
                    <h2 id="duplicate-modal-heading" class="slds-text-heading_medium slds-hyphenate">
                        <lightning-icon icon-name="utility:warning" alternative-text="Warning"
                                        size="small" class="slds-m-right_x-small"></lightning-icon>
                        Duplicates Detected
                    </h2>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-text-color_error slds-text-heading_small slds-m-bottom_small">
                        <strong>{duplicateWarningCount} DUPLICATE LINE ITEMS FOUND</strong>
                    </div>
                    <p class="slds-m-bottom_small">
                        <strong>Please review all duplicates before proceeding.</strong>
                    </p>
                    <p class="slds-m-bottom_medium">
                        Look for bill line items rows marked with ⚠️ 
                    </p>
                    <div class="slds-box slds-theme_shade slds-p-around_small slds-m-bottom_medium">
                        <p class="slds-text-body_small">
                            <strong>Action Required:</strong> Review each duplicate to ensure it's not a billing error before adjudicating.
                        </p>
                    </div>
                    <lightning-input
                        type="checkbox"
                        label="I confirm I have reviewed each duplicate line item and verified they are legitimate charges"
                        checked={duplicateCheckboxChecked}
                        onchange={handleDuplicateCheckboxChange}
                        class="slds-text-body_regular">
                    </lightning-input>
                </div>

                <!-- Modal Footer -->
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Go Back and Review"
                        onclick={handleCancelDuplicateModal}
                        class="slds-m-right_small">
                    </lightning-button>
                    <lightning-button
                        variant="destructive"
                        label="Continue with Adjudication"
                        onclick={handleContinueWithDuplicates}
                        disabled={isAdjudicateButtonDisabled}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- MVADM-185: Duplicate Details Modal with Tabs -->
    <template if:true={showDuplicateDetailsModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="duplicate-details-modal-heading" aria-modal="true"
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <!-- Modal Header -->
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={closeDuplicateDetailsModal}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="duplicate-details-modal-heading" class="slds-text-heading_medium slds-hyphenate">
                        <lightning-icon icon-name="utility:warning" alternative-text="Duplicate"
                                        size="small" class="slds-m-right_x-small"></lightning-icon>
                        <template if:true={selectedDuplicateLineItem}>
                            Duplicate Details for {selectedDuplicateLineItem.Name}
                        </template>
                    </h2>
                </header>

                <!-- Modal Body with Tabs -->
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- Tabs -->
                    <lightning-tabset active-tab-value={duplicateDetailsActiveTab} onselect={handleDuplicateDetailsTabChange}>

                        <!-- Tab 1: Matches Found -->
                        <lightning-tab label={matchesTabLabel} value="matches">
                            <div class="slds-p-around_small">
                                <template if:true={duplicateMatches}>
                                    <template if:true={duplicateMatches.length}>
                                        <p class="slds-m-bottom_small slds-text-body_small">
                                            Records that <strong>THIS</strong> line item matches:
                                        </p>

                                        <!-- Compact table of matches -->
                                        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_striped">
                                            <thead>
                                                <tr class="slds-line-height_reset">
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Type">Type</div>
                                                    </th>
                                                    <th scope="col" style="width: 120px;">
                                                        <div class="slds-truncate" title="Line Item">Line Item</div>
                                                    </th>
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Bill">Bill</div>
                                                    </th>
                                                    <th scope="col" style="width: 80px;">
                                                        <div class="slds-truncate" title="Procedure">Procedure</div>
                                                    </th>
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Charge">Charge</div>
                                                    </th>
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Service Date">Service Date</div>
                                                    </th>
                                                    <th scope="col" style="width: 200px;">
                                                        <div class="slds-truncate" title="Actions">Actions</div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={duplicateMatches} for:item="match">
                                                    <tr key={match.recordId} class="slds-hint-parent">
                                                        <td data-label="Type">
                                                            <lightning-badge label={match.matchTypeLabel}
                                                                           class={match.matchTypeClass}></lightning-badge>
                                                        </td>
                                                        <td data-label="Line Item">
                                                            <div class="slds-truncate" title={match.recordName}>{match.recordName}</div>
                                                        </td>
                                                        <td data-label="Bill">
                                                            <div class="slds-truncate" title={match.billExternalId}>{match.billExternalId}</div>
                                                        </td>
                                                        <td data-label="Procedure">
                                                            <div class="slds-truncate" title={match.procedureCode}>{match.procedureCode}</div>
                                                        </td>
                                                        <td data-label="Charge">
                                                            <div class="slds-truncate" title={match.formattedCharge}>{match.formattedCharge}</div>
                                                        </td>
                                                        <td data-label="Service Date">
                                                            <div class="slds-truncate" title={match.formattedDate}>{match.formattedDate}</div>
                                                        </td>
                                                        <td data-label="Actions">
                                                            <div class="slds-button-group" role="group">
                                                                <template if:true={match.caseId}>
                                                                    <lightning-button
                                                                        label="View Case"
                                                                        variant="neutral"
                                                                        onclick={navigateToCase}
                                                                        data-case-id={match.caseId}
                                                                        class="slds-m-right_xx-small">
                                                                    </lightning-button>
                                                                </template>
                                                                <lightning-button
                                                                    label="View Line Item"
                                                                    variant="brand"
                                                                    onclick={navigateToLineItem}
                                                                    data-line-item-id={match.recordId}>
                                                                </lightning-button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </template>
                                    <template if:false={duplicateMatches.length}>
                                        <p class="slds-text-color_weak">No matches found.</p>
                                    </template>
                                </template>
                            </div>
                        </lightning-tab>

                        <!-- Tab 2: Referenced By -->
                        <lightning-tab label={referencedByTabLabel} value="referencedBy">
                            <div class="slds-p-around_small">
                                <template if:true={duplicateReferences}>
                                    <template if:true={duplicateReferences.length}>
                                        <p class="slds-m-bottom_small slds-text-body_small">
                                            Records that reference <strong>THIS</strong> line item as a duplicate:
                                        </p>

                                        <!-- Compact table of references -->
                                        <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_striped">
                                            <thead>
                                                <tr class="slds-line-height_reset">
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Type">Type</div>
                                                    </th>
                                                    <th scope="col" style="width: 120px;">
                                                        <div class="slds-truncate" title="Line Item">Line Item</div>
                                                    </th>
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Bill">Bill</div>
                                                    </th>
                                                    <th scope="col" style="width: 80px;">
                                                        <div class="slds-truncate" title="Procedure">Procedure</div>
                                                    </th>
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Charge">Charge</div>
                                                    </th>
                                                    <th scope="col" style="width: 100px;">
                                                        <div class="slds-truncate" title="Service Date">Service Date</div>
                                                    </th>
                                                    <th scope="col" style="width: 200px;">
                                                        <div class="slds-truncate" title="Actions">Actions</div>
                                                    </th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template for:each={duplicateReferences} for:item="ref">
                                                    <tr key={ref.recordId} class="slds-hint-parent">
                                                        <td data-label="Type">
                                                            <lightning-badge label={ref.matchTypeLabel}
                                                                           class={ref.matchTypeClass}></lightning-badge>
                                                        </td>
                                                        <td data-label="Line Item">
                                                            <div class="slds-truncate" title={ref.recordName}>{ref.recordName}</div>
                                                        </td>
                                                        <td data-label="Bill">
                                                            <div class="slds-truncate" title={ref.billExternalId}>{ref.billExternalId}</div>
                                                        </td>
                                                        <td data-label="Procedure">
                                                            <div class="slds-truncate" title={ref.procedureCode}>{ref.procedureCode}</div>
                                                        </td>
                                                        <td data-label="Charge">
                                                            <div class="slds-truncate" title={ref.formattedCharge}>{ref.formattedCharge}</div>
                                                        </td>
                                                        <td data-label="Service Date">
                                                            <div class="slds-truncate" title={ref.formattedDate}>{ref.formattedDate}</div>
                                                        </td>
                                                        <td data-label="Actions">
                                                            <div class="slds-button-group" role="group">
                                                                <template if:true={ref.caseId}>
                                                                    <lightning-button
                                                                        label="View Case"
                                                                        variant="neutral"
                                                                        onclick={navigateToCase}
                                                                        data-case-id={ref.caseId}
                                                                        class="slds-m-right_xx-small">
                                                                    </lightning-button>
                                                                </template>
                                                                <lightning-button
                                                                    label="View Line Item"
                                                                    variant="brand"
                                                                    onclick={navigateToLineItem}
                                                                    data-line-item-id={ref.recordId}>
                                                                </lightning-button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </template>
                                    <template if:false={duplicateReferences.length}>
                                        <p class="slds-text-color_weak">No references found.</p>
                                    </template>
                                </template>
                            </div>
                        </lightning-tab>
                    </lightning-tabset>
                </div>

                <!-- Modal Footer -->
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Close"
                        variant="neutral"
                        onclick={closeDuplicateDetailsModal}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
