<template>
    <div class="dme-tab-container">
        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading DME data..." size="medium"></lightning-spinner>
                <p>Loading durable medical equipment information...</p>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={error}>
            <div class="error-container">
                <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                <p class="error-message">Unable to load DME data. Please contact your administrator.</p>
            </div>
        </template>

        <!-- Data Display -->
        <template if:true={hasDMEData}>
            <div class="tab-section-header">
                <h3 class="section-title">
                    <lightning-icon icon-name="standard:product" size="small"></lightning-icon>
                    Durable Medical Equipment (DME) - {dmeData.memberAccountName}
                </h3>
                <p class="section-subtitle">Medical equipment coverage and cost information</p>
            </div>

            <div class="dme-data-display">
                <!-- DME Summary Card -->
                <div class="data-card dme-summary-card">
                    <div class="card-header">
                        <lightning-icon icon-name="standard:dashboard" size="small"></lightning-icon>
                        <h4>DME Cost Summary</h4>
                    </div>
                    
                    <div class="summary-grid">
                        <div class="summary-item">
                            <span class="summary-label">MCA Total:</span>
                            <span class="summary-value">${dmeData.mcaTotal}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">MCA Medicals:</span>
                            <span class="summary-value">${dmeData.mcaTotalMedicals}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">MCA Prescriptions:</span>
                            <span class="summary-value">${dmeData.mcaTotalPrescriptions}</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Total Cost:</span>
                            <span class="summary-value">${dmeData.cost}</span>
                        </div>
                    </div>
                </div>

                <!-- DME Details Card -->
                <div class="data-card dme-details-card">
                    <div class="card-header">
                        <lightning-icon icon-name="standard:product" size="small"></lightning-icon>
                        <h4>Equipment Details</h4>
                    </div>
                    
                    <div class="dme-details">
                        <div class="detail-row">
                            <span class="detail-label">Case Number:</span>
                            <span class="detail-value">{dmeData.caseNumber}</span>
                        </div>
                        <template if:true={dmeData.costDriverItem}>
                            <div class="detail-row">
                                <span class="detail-label">Cost Driver Item:</span>
                                <span class="detail-value">{dmeData.costDriverItem}</span>
                            </div>
                        </template>
                        <div class="detail-row">
                            <span class="detail-label">Facilities Coverage:</span>
                            <span class="detail-value">{dmeData.facilities}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Diagnostic/Medical Care:</span>
                            <span class="detail-value">{dmeData.diagnosticMedicalCare}</span>
                        </div>
                    </div>
                </div>

                <!-- Account Information Card -->
                <div class="data-card account-info-card">
                    <div class="card-header">
                        <lightning-icon icon-name="standard:account" size="small"></lightning-icon>
                        <h4>Member Account Information</h4>
                    </div>
                    
                    <div class="account-details">
                        <div class="detail-row">
                            <span class="detail-label">Account Name:</span>
                            <span class="detail-value">{dmeData.memberAccountName}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">SAK Status:</span>
                            <span class="detail-value">{dmeData.sakStatus}</span>
                        </div>
                        <template if:true={dmeData.accountExpirationDate}>
                            <div class="detail-row">
                                <span class="detail-label">Account Expiration:</span>
                                <span class="detail-value">{dmeData.accountExpirationDate}</span>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Equipment List (if available) -->
                <template if:true={equipment}>
                    <template if:true={equipment.length}>
                        <div class="data-card equipment-list-card">
                            <div class="card-header">
                                <lightning-icon icon-name="standard:product_item" size="small"></lightning-icon>
                                <h4>Equipment Items</h4>
                            </div>
                            
                            <div class="equipment-list">
                                <template for:each={equipment} for:item="item">
                                    <div key={item.id} class="equipment-item">
                                        <div class="equipment-header">
                                            <span class="equipment-name">{item.name}</span>
                                            <span class="equipment-cost">${item.cost}</span>
                                        </div>
                                        <div class="equipment-details">
                                            <span class="equipment-category">{item.category}</span>
                                            <span class="equipment-status">{item.status}</span>
                                        </div>
                                        <template if:true={item.description}>
                                            <div class="equipment-description">
                                                <p>{item.description}</p>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </template>
            </div>
        </template>

        <!-- No Data State -->
        <template if:false={hasDMEData}>
            <template if:false={isLoading}>
                <template if:false={error}>
                    <div class="no-data-container">
                        <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                        <p>No DME equipment data available for this case.</p>
                    </div>
                </template>
            </template>
        </template>
    </div>
</template>
