<template>
    <div class="injury-tab-container">
        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading injury data..." size="medium"></lightning-spinner>
                <p>Loading injury coverage information...</p>
            </div>
        </template>

        <!-- Error State -->
        <template if:true={error}>
            <div class="error-container">
                <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                <p class="error-message">Unable to load injury data. Please contact your administrator.</p>
            </div>
        </template>

        <!-- Data Display -->
        <template if:true={hasInjuryData}>
            <div class="tab-section-header">
                <h3 class="section-title">
                    <lightning-icon icon-name="standard:case" size="small"></lightning-icon>
                    Injury Coverage - {memberAccountInfo.accountName}
                </h3>
                <p class="section-subtitle">Covered injuries and treatment authorization for this Member Account</p>
            </div>

            <div class="medical-data-display">
                <template for:each={injuries} for:item="injury">
                    <div key={injury.id} class="data-card injury-card">
                        <div class="injury-header">
                            <div class="injury-title">
                                <lightning-icon icon-name="standard:case" size="small"></lightning-icon>
                                <h4>{injury.injuryType}</h4>
                                <span class={injury.statusClass}>{injury.status}</span>
                            </div>
                            <div class="injury-dates">
                                <span class="date-label">Date of Injury:</span>
                                <span class="date-value">{injury.dateOfInjury}</span>
                            </div>
                        </div>
                        
                        <div class="injury-details">
                            <div class="detail-row">
                                <span class="detail-label">Body Part:</span>
                                <span class="detail-value">{injury.bodyPart}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Coverage Status:</span>
                                <span class="detail-value">{injury.coverageStatus}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Authorization Required:</span>
                                <span class="detail-value">{injury.authorizationRequired}</span>
                            </div>
                            <template if:true={injury.description}>
                                <div class="detail-row">
                                    <span class="detail-label">Description:</span>
                                    <span class="detail-value">{injury.description}</span>
                                </div>
                            </template>
                        </div>

                        <template if:true={injury.coverageNotes}>
                            <div class="injury-notes">
                                <h5>Coverage Notes:</h5>
                                <p>{injury.coverageNotes}</p>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- No Data State -->
        <template if:false={hasInjuryData}>
            <template if:false={isLoading}>
                <template if:false={error}>
                    <div class="no-data-container">
                        <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                        <p>No injury coverage data available for this case.</p>
                    </div>
                </template>
            </template>
        </template>
    </div>
</template>
